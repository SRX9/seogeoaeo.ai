name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          # Required for HeroUI Pro package access in CI. Lifecycle scripts are
          # disabled here so dependency install code cannot read the token.
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
      # Run allowed dependency build scripts after the secret-bearing install step.
      - run: pnpm rebuild @heroui-pro/react
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
      - run: node scripts/verify-heroui-pro.mjs

      - name: Apply database migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not configured; skipping migrations."
            exit 0
          fi
          pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Deploy via the project's own script (same path used locally). It builds
      # OpenNext, bundles the worker with `wrangler deploy --dry-run --outdir`,
      # patches the middleware-manifest dynamic require, then deploys the
      # prebuilt bundle through a plain-worker config. This deliberately avoids
      # `wrangler deploy` delegating to `opennextjs-cloudflare deploy`, whose
      # getPlatformProxy (Miniflare) step demands a local Hyperdrive connection
      # string that is irrelevant to a production deploy.
      #
      # Runtime Worker secrets are NOT synced from CI — they are set once from a
      # developer machine with `pnpm secrets:cf` and persist on the Worker.
      # wrangler authenticates from CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID.
      - name: Build and deploy Worker
        run: pnpm deploy:cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
