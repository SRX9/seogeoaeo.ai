name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        env:
          # Required so the @heroui-pro/react postinstall can download the
          # licensed component code in CI (otherwise it exits 0 with a stub
          # and the build fails with "Cannot find module '@heroui-pro/react'").
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}

      - name: Apply database migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not configured; skipping migrations."
            exit 0
          fi
          pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build for Cloudflare
        run: pnpm build:cf
        env:
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}

      # Runtime Worker secrets are NOT synced from CI. They are set once from a
      # developer machine with `pnpm secrets:cf .env` and persist on the Worker
      # across deploys. CI only needs the values used at build/deploy time
      # (CLOUDFLARE_*, HEROUI_AUTH_TOKEN, DATABASE_URL, BETTER_AUTH_URL).
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
