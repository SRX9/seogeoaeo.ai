name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        env:
          # Required so the @heroui-pro/react postinstall can download the
          # licensed component code in CI (otherwise it exits 0 with a stub
          # and the build fails with "Cannot find module '@heroui-pro/react'").
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}

      - name: Apply database migrations
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not configured; skipping migrations."
            exit 0
          fi
          pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build for Cloudflare
        run: pnpm build:cf
        env:
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}

      # Deploy first so the Worker exists, THEN sync secrets. wrangler-action's
      # built-in `secrets:` uploads before deploy (fails on a brand-new Worker)
      # and hard-fails on any empty value, so we sync via secrets:cf instead,
      # which skips empty/unconfigured secrets.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Sync Worker secrets
        run: pnpm secrets:cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_INDIE: ${{ secrets.STRIPE_PRICE_INDIE }}
          STRIPE_PRICE_STARTUP: ${{ secrets.STRIPE_PRICE_STARTUP }}
          STRIPE_PRICE_SCALE: ${{ secrets.STRIPE_PRICE_SCALE }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
          STRIPE_PRICE_PACK_SMALL: ${{ secrets.STRIPE_PRICE_PACK_SMALL }}
          STRIPE_PRICE_PACK_MEDIUM: ${{ secrets.STRIPE_PRICE_PACK_MEDIUM }}
          STRIPE_PRICE_PACK_LARGE: ${{ secrets.STRIPE_PRICE_PACK_LARGE }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_LIGHT_MODEL: ${{ secrets.LLM_LIGHT_MODEL }}
          LLM_HEAVY_MODEL: ${{ secrets.LLM_HEAVY_MODEL }}
          LLM_IMAGE_MODEL: ${{ secrets.LLM_IMAGE_MODEL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          KEYWORD_API_URL: ${{ secrets.KEYWORD_API_URL }}
